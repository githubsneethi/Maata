<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenglish</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:90%;
            max-width:550px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .section{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#555;
        }

        textarea{
            width:100%;
            min-height:100px;
            resize:none;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            font-size:16px;
            transition:.3s;
        }

        textarea:focus{
            outline:none;
            border-color:#667eea;
        }

        #telugu{
            background:#f7f7f7;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#5a67d8;
        }

        .info{
            margin-top:25px;
            background:#eef3ff;
            padding:15px;
            border-left:5px solid #667eea;
            border-radius:8px;
            color:#333;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>English → Telugu Keyboard</h1>

    <div class="section">

        <label for="english">English</label>

        <textarea
            id="english"
            placeholder="Type here..."></textarea>

    </div>

    <div class="section">

        <label for="telugu">Telugu</label>

        <textarea
            id="telugu"
            readonly
            placeholder="Telugu text will appear here..."></textarea>

    </div>

    <button onclick="clearText()">Clear</button>

    <div class="info">
        <strong>💡 Tip:</strong> Start typing in the English box and the Telugu transliteration will appear automatically.
    </div>

</div>

<script>

const englishBox = document.getElementById("english");
const teluguBox = document.getElementById("telugu");

englishBox.addEventListener("input", () => {

    fetch("/transliterate",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            text:englishBox.value
        })

    })

    .then(response=>response.json())

    .then(data=>{

        teluguBox.value=data.telugu;

    })

    .catch(error=>console.error(error));

});

function clearText(){

    englishBox.value="";
    teluguBox.value="";

}

</script>

</body>
</html>
